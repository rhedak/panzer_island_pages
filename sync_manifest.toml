# Asset sync manifest
# Maps source paths (relative to sister repo root) to dest paths (relative to this repo root).
# Run:  uv run python sync_assets.py          -- check only
#       uv run python sync_assets.py --sync   -- copy updated/missing files

[repos]
sister = "../tank_tactics_2d"

# Individual Markdown guide files
[[files]]
src = "docs/player_guide/reactive_turns.md"
dst = "docs/guides/reactive_turns.md"

# Guide asset images (whole directory)
[[dirs]]
src = "docs/player_guide/guide_assets"
dst = "docs/guides/guide_assets"
glob = "*.png"

# Site branding assets
[[files]]
src = "marketing/logo.png"
dst = "docs/assets/logo.png"

[[files]]
src = "marketing/shortcut_icon.png"
dst = "docs/assets/shortcut_icon.png"

[[files]]
src = "marketing/page_background.png"
dst = "docs/assets/page_background.png"

# Target-type badge icons (used in drone reference legend)
[[files]]
src = "assets/generated/ui/icon_target_all.png"
dst = "docs/assets/ui/icon_target_all.png"

[[files]]
src = "assets/generated/ui/icon_target_ag.png"
dst = "docs/assets/ui/icon_target_ag.png"

[[files]]
src = "assets/generated/ui/icon_target_aa.png"
dst = "docs/assets/ui/icon_target_aa.png"

# Drone sprites (base + typed variants, no animation frames)
[[dirs]]
src = "assets/generated/drones"
dst = "docs/assets/drones"
glob = "*[!0-9].png"

# Unit sprites (single base frame per unit)
[[files]]
src = "assets/generated/units/katyusha.png"
dst = "docs/assets/units/katyusha.png"

[[files]]
src = "assets/generated/units/nadeshiko.png"
dst = "docs/assets/units/nadeshiko.png"

[[files]]
src = "assets/generated/units/maria.png"
dst = "docs/assets/units/maria.png"
