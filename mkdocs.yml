site_name: Panzer Island
site_description: Documentation and guides for Panzer Island
site_url: https://rhedak.github.io/panzer_island_pages/
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Guides:
    - guides/index.md
  - Press Kit: press/index.md
  - Blog:
    - blog/index.md

plugins:
  - search
  - blog

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
