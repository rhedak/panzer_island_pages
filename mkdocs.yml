site_name: Panzer Island
site_description: Documentation and guides for Panzer Island
site_url: https://rhedak.github.io/panzer_island_pages/
docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/shortcut_icon.png
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Webnovel:
    - Overview: webnovel/index.md
    - "Chapter 1: First Steps": webnovel/ch01.md
  - Guides:
    - Getting Started: guides/index.md
    - Your Units: guides/characters.md
    - Drones: guides/drones.md
    - Stage Objectives: guides/objectives.md
    - Advanced Tactics: guides/advanced.md
    - Skill Builds: guides/skill-builds.md
    - Reactive Turns: guides/reactive_turns.md
  - Story:
    - The World: story/index.md
    - Characters: story/characters.md
  - FAQ: faq.md
  - Support: support.md
  - Credits: credits.md
  - Press Kit: press/index.md
  - Blog:
    - blog/index.md

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - blog:
      blog_toc: true
      post_date_format: long
      archive: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
