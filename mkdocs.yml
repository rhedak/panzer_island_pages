site_name: Panzer Island
site_description: Documentation and guides for Panzer Island
site_url: https://rhedak.github.io/panzer_island_pages/
docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/shortcut_icon.png
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Webnovel:
    - Overview: webnovel/index.md
    - "Chapter 1: First Steps": webnovel/ch01.md
    - "Chapter 2: Assembly": webnovel/ch02.md
    - "Chapter 2F: Population": webnovel/ch02f.md
    - "Chapter 3: Oracle": webnovel/ch03.md
    - "Chapter 4: The Guide": webnovel/ch04.md
    - "Chapter 5: The Crossing": webnovel/ch05.md
    - "Chapter 6: Another Lab": webnovel/ch06.md
    - "Chapter 7: The Boneyard": webnovel/ch07.md
    - "Chapter 8: Dr. E.": webnovel/ch08.md
    - "Chapter 9: Twenty-Three Names": webnovel/ch09.md
    - "Chapter 10: The Archive": webnovel/ch10.md
    - "Chapter 11: The Nest": webnovel/ch11.md
    - "Chapter 11F: The Other PI": webnovel/ch11f.md
    - "Chapter 12: The Range": webnovel/ch12.md
    - "Chapter 13: The Anomaly": webnovel/ch13.md
    - "Chapter 14: The Wrong Tests": webnovel/ch14.md
    - "Chapter 14F: Phase 3": webnovel/ch14f.md
    - "Chapter 15: Oracle's Skeleton": webnovel/ch15.md
  - Guides:
    - Getting Started: guides/index.md
    - Your Units: guides/characters.md
    - Drones: guides/drones.md
    - Stage Objectives: guides/objectives.md
    - Advanced Tactics: guides/advanced.md
    - Skill Builds: guides/skill-builds.md
    - Reactive Turns: guides/reactive_turns.md
    - Challenge Mode: guides/challenge-mode.md
    - "Panzer Island: Skirmish": guides/reddit.md
    - Balancing and Math: guides/balancing.md
  - Story:
    - The World: story/index.md
    - Characters: story/characters.md
  - FAQ: faq.md
  - Support: support.md
  - Credits: credits.md
  - Press Kit: press/index.md
  - Blog:
    - blog/index.md

hooks:
  - hooks/append_cta_footer.py

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - blog:
      blog_toc: true
      post_date_format: long
      archive: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
